<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Drive</title>
    <meta name="description" content="Your personal cloud storage powered by Telegram. Upload, download, and manage files securely.">
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-row">
                <div>
                    <h1>Telegram Drive</h1>
                    <p>Encrypted cloud storage powered by Telegram.</p>
                </div>
                <div class="user-bar">
                    <div class="user-avatar" id="user-avatar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <span id="user-display-name" class="user-name">User</span>
                    <button class="btn-logout" onclick="logoutUser()" title="Logout">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <section class="upload-section">
            <div class="upload-zone" id="drop-zone">
                <input type="file" id="file-input" style="display: none;" multiple>
                <div class="upload-content">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <p>Drag & drop files here or <span class="highlight">browse</span></p>
                    <p class="upload-hint">Files are stored in your Telegram Saved Messages</p>
                </div>
            </div>
            <div id="upload-progress-container" class="hidden">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="upload-progress-fill"></div>
                </div>
                <p id="upload-status">Uploading...</p>
            </div>
        </section>

        <section class="files-section">
            <h2>Your Files</h2>
            <div class="table-container">
                <table id="files-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Size</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="files-tbody">
                        <!-- File rows will be injected here via JS -->
                    </tbody>
                </table>
                <div id="empty-state" class="hidden">
                    <p>No files uploaded yet.</p>
                </div>
            </div>
        </section>
    </div>

    <script src="/upload.js"></script>
</body>
</html>
